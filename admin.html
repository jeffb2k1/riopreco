<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RioPreço — Administração</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f4f2; color: #1a1a1a; }
    nav { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 20px; font-weight: 600; }
    .logo span { color: #1D9E75; }
    .logo small { font-size: 13px; color: #888; font-weight: 400; margin-left: 8px; }
    .main { max-width: 760px; margin: 24px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e5; padding: 24px; margin-bottom: 20px; }
    h2 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    p { font-size: 13px; color: #888; margin-bottom: 20px; }
    .upload-area { border: 2px dashed #ddd; border-radius: 10px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .upload-area:hover { border-color: #1D9E75; background: #f0fdf8; }
    .upload-area.arrastando { border-color: #1D9E75; background: #f0fdf8; }
    .upload-icon { font-size: 40px; margin-bottom: 12px; }
    .upload-texto { font-size: 15px; font-weight: 500; color: #1a1a1a; margin-bottom: 6px; }
    .upload-sub { font-size: 13px; color: #888; }
    input[type="file"] { display: none; }
    .preview-img { max-width: 100%; border-radius: 8px; margin-top: 16px; display: none; }
    .select-mercado { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; margin-bottom: 16px; }
    .select-mercado:focus { outline: none; border-color: #1D9E75; }
    .btn-processar { width: 100%; padding: 13px; border-radius: 10px; border: none; background: #1D9E75; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 16px; }
    .btn-processar:hover { background: #0F6E56; }
    .btn-processar:disabled { background: #aaa; cursor: not-allowed; }
    .status { margin-top: 16px; padding: 14px; border-radius: 8px; font-size: 14px; display: none; }
    .status.processando { background: #EFF6FF; color: #1D4ED8; display: block; }
    .status.erro { background: #FAECE7; color: #993C1D; display: block; }
    .status.sucesso { background: #E1F5EE; color: #0F6E56; display: block; }
    .resultado { margin-top: 20px; display: none; }
    .resultado h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
    .produto-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; border: 1px solid #e5e5e5; margin-bottom: 8px; background: #fff; }
    .produto-item input[type="text"], .produto-item input[type="number"] { padding: 7px 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 13px; }
    .produto-item input[type="text"] { flex: 2; }
    .produto-item input[type="number"] { flex: 1; }
    .produto-item input:focus { outline: none; border-color: #1D9E75; }
    .produto-check { width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; }
    .btn-salvar { width: 100%; padding: 13px; border-radius: 10px; border: none; background: #1D9E75; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; }
    .btn-salvar:hover { background: #0F6E56; }
    .cabecalho-resultado { display: flex; gap: 8px; padding: 8px 12px; font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; }
    .loading-dots::after { content: '.'; animation: dots 1.5s infinite; }
    @keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }
  </style>
</head>
<body>

<nav>
  <div class="logo">Rio<span>Preço</span> <small>Administração</small></div>
  <a href="/" style="font-size:13px;color:#888;text-decoration:none;">← Voltar ao site</a>
</nav>

<div class="main">
  <div class="card">
    <h2>📄 Processar encarte de supermercado</h2>
    <p>Faça upload do encarte em imagem (JPG, PNG). A IA vai extrair todos os produtos e preços automaticamente.</p>

    <select class="select-mercado" id="mercado" onchange="verificarBotao()">
      <option value="">Selecione o supermercado...</option>
      <option value="Guanabara">Guanabara</option>
      <option value="Mundial">Mundial</option>
      <option value="Extra">Extra</option>
      <option value="Prezunic">Prezunic</option>
      <option value="Assaí">Assaí</option>
    </select>

    <div class="upload-area" id="upload-area" onclick="document.getElementById('arquivo').click()"
      ondragover="event.preventDefault();this.classList.add('arrastando')"
      ondragleave="this.classList.remove('arrastando')"
      ondrop="soltarArquivo(event)">
      <div class="upload-icon">📂</div>
      <div class="upload-texto" id="upload-texto">Clique para selecionar ou arraste o encarte aqui</div>
      <div class="upload-sub">JPG ou PNG — até 10MB</div>
      <img id="preview-img" class="preview-img" />
    </div>
    <input type="file" id="arquivo" accept="image/*" onchange="selecionarArquivo(event)" />

    <div class="status" id="status"></div>

    <button class="btn-processar" id="btn-processar" onclick="processar()" disabled>
      🤖 Processar com IA
    </button>
  </div>

  <div class="resultado" id="resultado">
    <div class="card">
      <h3 id="titulo-resultado">Produtos encontrados</h3>
      <div class="cabecalho-resultado">
        <div style="width:18px"></div>
        <div style="flex:2">Produto</div>
        <div style="flex:1">Preço (R$)</div>
      </div>
      <div id="lista-produtos"></div>
      <button class="btn-salvar" onclick="salvarNoBanco()">💾 Salvar preços no banco de dados</button>
    </div>
  </div>
</div>

<script>
  const URL_SB = 'https://hpeoyckeauayaobonbyi.supabase.co';
  const CHAVE_SB = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwZW95Y2tlYXVheWFvYm9uYnlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2ODgxODUsImV4cCI6MjA5MzI2NDE4NX0.un2peLk0Q7bHKymZRQE4G9m3800TYU3GY9hK2FFDylA';
  const db = supabase.createClient(URL_SB, CHAVE_SB);

  let arquivoBase64 = null;
  let tipoArquivo = null;
  let produtosExtraidos = [];

  function selecionarArquivo(e) {
    const arquivo = e.target.files[0];
    if (arquivo) processarArquivo(arquivo);
  }

  function soltarArquivo(e) {
    e.preventDefault();
    document.getElementById('upload-area').classList.remove('arrastando');
    const arquivo = e.dataTransfer.files[0];
    if (arquivo) processarArquivo(arquivo);
  }

  function processarArquivo(arquivo) {
    tipoArquivo = arquivo.type;
    document.getElementById('upload-texto').textContent = arquivo.name;
    const reader = new FileReader();
    reader.onload = function(e) {
      arquivoBase64 = e.target.result.split(',')[1];
      const img = document.getElementById('preview-img');
      img.src = e.target.result;
      img.style.display = 'block';
      verificarBotao();
    };
    reader.readAsDataURL(arquivo);
  }

  function verificarBotao() {
    const mercado = document.getElementById('mercado').value;
    document.getElementById('btn-processar').disabled = !(arquivoBase64 && mercado);
  }

  async function processar() {
    const mercado = document.getElementById('mercado').value;
    const status = document.getElementById('status');
    status.className = 'status processando';
    status.innerHTML = '🤖 Processando encarte com IA<span class="loading-dots"></span>';
    document.getElementById('btn-processar').disabled = true;
    document.getElementById('resultado').style.display = 'none';

    try {
      const resposta = await fetch('/api/processar-encarte', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ imagem: arquivoBase64, tipo: tipoArquivo, mercado })
      });

      const dados = await resposta.json();
      if (dados.erro) throw new Error(dados.erro);

      produtosExtraidos = dados.produtos || [];
      if (produtosExtraidos.length === 0) throw new Error('Nenhum produto encontrado no encarte.');

      status.className = 'status sucesso';
      status.textContent = `✅ ${produtosExtraidos.length} produtos encontrados! Revise abaixo e salve no banco.`;

      document.getElementById('titulo-resultado').textContent = `${produtosExtraidos.length} produtos encontrados — ${mercado}`;
      document.getElementById('lista-produtos').innerHTML = produtosExtraidos.map((p, i) => `
        <div class="produto-item">
          <input type="checkbox" class="produto-check" id="check-${i}" checked />
          <input type="text" id="nome-${i}" value="${p.nome}" />
          <input type="number" id="preco-${i}" value="${p.preco}" step="0.01" />
        </div>
      `).join('');
      document.getElementById('resultado').style.display = 'block';

    } catch (erro) {
      status.className = 'status erro';
      status.textContent = '❌ Erro: ' + erro.message;
    }

    document.getElementById('btn-processar').disabled = false;
  }

  async function salvarNoBanco() {
    const mercado = document.getElementById('mercado').value;
    const status = document.getElementById('status');
    status.className = 'status processando';
    status.innerHTML = '💾 Salvando no banco de dados<span class="loading-dots"></span>';

    try {
      let { data: supData } = await db.from('supermercados').select('id').eq('nome', mercado).single();
      if (!supData) {
        const { data: novoSup } = await db.from('supermercados').insert([{ nome: mercado }]).select().single();
        supData = novoSup;
      }
      const supId = supData.id;
      let salvos = 0;

      for (let i = 0; i < produtosExtraidos.length; i++) {
        const check = document.getElementById(`check-${i}`);
        if (!check.checked) continue;
        const nome = document.getElementById(`nome-${i}`).value.trim();
        const preco = parseFloat(document.getElementById(`preco-${i}`).value);
        if (!nome || !preco) continue;

        let { data: prodData } = await db.from('produtos').select('id').eq('nome', nome).single();
        if (!prodData) {
          const { data: novoProd } = await db.from('produtos').insert([{ nome, categoria: 'Encarte', unidade: '' }]).select().single();
          prodData = novoProd;
        }
        const prodId = prodData.id;

        const { data: precoExist } = await db.from('precos').select('id').eq('produto_id', prodId).eq('supermercado_id', supId).single();
        if (precoExist) {
          await db.from('precos').update({ preco, em_promocao: true, atualizado_em: new Date() }).eq('id', precoExist.id);
        } else {
          await db.from('precos').insert([{ produto_id: prodId, supermercado_id: supId, preco, em_promocao: true }]);
        }
        salvos++;
      }

      status.className = 'status sucesso';
      status.textContent = `✅ ${salvos} preços salvos com sucesso! Já aparecem no site.`;
      document.getElementById('resultado').style.display = 'none';

    } catch (erro) {
      status.className = 'status erro';
      status.textContent = '❌ Erro ao salvar: ' + erro.message;
    }
  }
</script>
</body>
</html>
